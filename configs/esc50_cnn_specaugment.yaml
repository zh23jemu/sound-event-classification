# ESC-50 CNN + SpecAugment 对比实验配置。
# 该配置沿用 baseline 的数据划分、模型结构和优化器，只在训练频谱上启用 SpecAugment。
seed: 42

data:
  # ESC-50 解压后的根目录，目录下应包含 meta/esc50.csv 和 audio/*.wav。
  root: data/ESC-50
  sample_rate: 32000
  duration_seconds: 5.0
  n_mels: 128
  n_fft: 1024
  hop_length: 320
  train_folds: [1, 2, 3, 4]
  val_folds: [5]

train:
  batch_size: 16
  epochs: 20
  learning_rate: 0.001
  weight_decay: 0.0001
  num_workers: 0
  device: auto
  amp: false

augmentation:
  # SpecAugment 只在训练阶段遮挡频率带和时间片段，验证阶段不启用。
  enabled: true
  freq_mask_param: 16
  time_mask_param: 32
  num_freq_masks: 2
  num_time_masks: 2
  p: 1.0

model:
  name: cnn_baseline
  num_classes: 50
  dropout: 0.2

output:
  dir: outputs/esc50_cnn_specaugment
